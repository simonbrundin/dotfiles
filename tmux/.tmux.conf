# --- General Settings ---
set -g prefix C-b               # Sätt prefix till Ctrl-d
set -g mouse on                 # Aktivera mus för att ändra storlek på paneler
set -g default-terminal "tmux-256color"  # Sätt terminal till 256 färger
set-option -g status-position top       # Placera statusfältet högst upp
set-option -g allow-rename off          # Förhindra automatisk namnändring av fönster
set-option -g focus-events on
set -g detach-on-destroy off  # don't exit from tmux when closing a session
bind -N "last-session (via sesh) " L run-shell "sesh last"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g status-style bg=default
set -g extended-keys on
set -g extended-keys-format csi-u

# --- Key Bindings ---
unbind r
bind r source-file ~/.tmux.conf         # Ladda om konfig med 'r'

# Stäng pane utan bekräftelse
bind-key x kill-pane

# Öppna Files
bind-key f run-shell "tmuxinator start Files"

# Pane navigation (h,j,k,l för vänster, ner, upp, höger)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Nästa fönster med Ctrl-y (utan prefix)
bind -n C-y next-window

# Sesh
bind -n C-u run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'           # Tmux Plugin Manager
set -g @plugin 'catppuccin/tmux'            # Catppuccin-tema
set -g @plugin 'tmux-plugins/tmux-battery'  # Batteristatus-plugin
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Obs: 'arl/gitmux' är inte en TPM-plugin, den installeras via Homebrew

# --- Catppuccin Theme Configuration ---
# set -g @catppuccin_flavour "mocha"          # Välj Catppuccin-smak
set -g @catppuccin_window_status_style "rounded"  # Rundad stil för fönsterstatus
set -g @catppuccin_status_connect_separator "no"  # Gör varje status-modul separat rundad
set -g @catppuccin_status_right_separator ""    # Rundad höger separator för alla moduler

# # Fönsterinställningar
set -g @catppuccin_window_text " #W"      # Visa fönsternamn för inaktiva fönster
set -g @catppuccin_window_current_text " #W"      # Visa fönsternamn för aktivt fönster
set -g @catppuccin_window_default_fill "none"    # Ingen fyllning för inaktiva fönster
set -g @catppuccin_window_current_fill "none"    # Ingen fyllning för aktivt fönster

# Statusfält - Vänster sida
set -g status-left-length 100  # Öka längden till 100 tecken (justera vid behov)
set -g status-left ""                       # Tomt vänsterfält för enkelhet

